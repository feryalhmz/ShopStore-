<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سهل شوب - طلباتي</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Cairo', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #2563EB; --orange: #FF6B00; --dark: #1e293b; --light: #f0f4ff; }
    body { background: #f8faff; }

    /* NAVBAR */
    .navbar {
      background: white;
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(37,99,235,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-logo img { height: 44px; cursor: pointer; }
    .navbar-actions { display: flex; align-items: center; gap: 6px; }
    .nav-icon-btn {
      position: relative;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .nav-icon-btn:hover { background: var(--light); }
    .badge-dot {
      position: absolute;
      top: 4px;
      left: 4px;
      background: var(--orange);
      color: white;
      font-size: 10px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--light);
      border-radius: 12px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      border: none;
    }

    /* PAGE HEADER */
    .page-header {
      background: linear-gradient(135deg, #1e3a8a, #2563EB);
      padding: 28px 32px;
      color: white;
    }
    .page-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .page-header p { font-size: 13px; opacity: 0.8; margin: 0; }

    /* MAIN */
    .main-content { padding: 28px 32px; max-width: 900px; margin: 0 auto; }

    /* FILTER TABS */
    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-tab {
      background: white;
      border: 2px solid #e8eef8;
      border-radius: 10px;
      padding: 8px 20px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab:hover { border-color: var(--blue); color: var(--blue); }
    .filter-tab.active { background: var(--blue); color: white; border-color: var(--blue); }

    /* ORDER CARD */
    .order-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      margin-bottom: 16px;
      border: 2px solid transparent;
      transition: border 0.2s;
    }
    .order-card:hover { border-color: #e8eef8; }

    .order-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-id { font-size: 15px; font-weight: 800; color: var(--dark); }
    .order-id span { color: var(--blue); }
    .order-date { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    /* STATUS BADGE */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 20px;
    }
    .status-pending { background: #FFF7ED; color: #EA580C; }
    .status-confirmed { background: #EFF6FF; color: #2563EB; }
    .status-shipped { background: #F0FDF4; color: #16A34A; }
    .status-delivered { background: #F0FDF4; color: #15803D; }
    .status-cancelled { background: #FEF2F2; color: #DC2626; }

    /* TRACKING BAR */
    .tracking-bar {
      display: flex;
      align-items: center;
      margin: 16px 0;
      padding: 16px;
      background: #f8faff;
      border-radius: 14px;
    }
    .track-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .track-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background: #e2e8f0;
      color: #94a3b8;
      margin-bottom: 6px;
      z-index: 1;
    }
    .track-icon.done { background: var(--blue); color: white; }
    .track-icon.current { background: var(--orange); color: white; }
    .track-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-align: center; }
    .track-label.done { color: var(--blue); }
    .track-label.current { color: var(--orange); }
    .track-line {
      position: absolute;
      top: 18px;
      right: 50%;
      width: 100%;
      height: 2px;
      background: #e2e8f0;
      z-index: 0;
    }
    .track-line.done { background: var(--blue); }
    .track-step:first-child .track-line { display: none; }

    /* ORDER ITEMS */
    .order-items-list { margin: 12px 0; }
    .order-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f8f8f8;
    }
    .order-item-row:last-child { border-bottom: none; }
    .item-thumb {
      width: 52px;
      height: 52px;
      background: var(--light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .item-details { flex: 1; }
    .item-details .name { font-size: 14px; font-weight: 700; color: var(--dark); }
    .item-details .qty { font-size: 12px; color: #94a3b8; }
    .item-price { font-size: 14px; font-weight: 800; color: var(--blue); }

    /* ORDER FOOTER */
    .order-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-total { font-size: 16px; font-weight: 800; color: var(--dark); }
    .order-total span { color: var(--blue); }
    .btn-reorder {
      background: var(--light);
      color: var(--blue);
      border: none;
      border-radius: 10px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reorder:hover { background: #dbeafe; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }
    .empty-state .icon { font-size: 72px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 22px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .empty-state p { color: #94a3b8; margin-bottom: 24px; }
    .btn-shop {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    /* FOOTER */
    footer {
      background: #0f172a;
      color: #64748b;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 40px;
    }
    .footer-logo { font-size: 18px; font-weight: 800; color: white; }
    .footer-logo span { color: var(--orange); }

    @media (max-width: 768px) {
      .main-content { padding: 16px; }
      .navbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo" onclick="window.location.href='home.html'">
      <img src="assets/images/logo.png" alt="سهل شوب">
    </div>
    <div class="navbar-actions">
      <button class="nav-icon-btn" onclick="window.location.href='cart.html'">
        🛒 <span class="badge-dot" id="cartCount">0</span>
      </button>
      <button class="nav-user" onclick="window.location.href='profile.html'">
        👤 <span id="userName">حسابي</span>
      </button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>📦 طلباتي</h1>
    <p>تتبع جميع طلباتك ومشترياتك</p>
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterOrders('all', this)">الكل</button>
      <button class="filter-tab" onclick="filterOrders('pending', this)">🕐 قيد الانتظار</button>
      <button class="filter-tab" onclick="filterOrders('confirmed', this)">✅ مؤكد</button>
      <button class="filter-tab" onclick="filterOrders('shipped', this)">🚚 قيد التوصيل</button>
      <button class="filter-tab" onclick="filterOrders('delivered', this)">🎉 تم التسليم</button>
    </div>

    <!-- ORDERS LIST -->
    <div id="ordersList">
      <div class="text-center py-5" style="color:#aaa;">
        <div style="font-size:40px">⏳</div>
        <p style="margin-top:8px;">جاري تحميل طلباتك...</p>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">سهل<span>شوب</span></div>
    <p style="margin:0;font-size:13px;">جميع الحقوق محفوظة © 2025</p>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="JS/firebase-config.js"></script>

  <script>
    let allOrders = [];
    let currentFilter = "all";

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        db.collection("users").doc(user.uid).get().then(doc => {
          if (doc.exists) {
            document.getElementById("userName").textContent = doc.data().name.split(" ")[0];
          }
        });
        loadOrders(user.uid);
        updateCartCount();
      }
    });

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      document.getElementById("cartCount").textContent = cart.reduce((s, i) => s + i.qty, 0);
    }

    function loadOrders(uid) {
      db.collection("orders")
        .where("userId", "==", uid)
        .orderBy("createdAt", "desc")
        .get()
        .then(snapshot => {
          allOrders = [];
          snapshot.forEach(doc => allOrders.push({ id: doc.id, ...doc.data() }));
          renderOrders();
        }).catch(() => {
          db.collection("orders").where("userId", "==", uid).get().then(snapshot => {
            allOrders = [];
            snapshot.forEach(doc => allOrders.push({ id: doc.id, ...doc.data() }));
            renderOrders();
          });
        });
    }

    function filterOrders(status, el) {
      currentFilter = status;
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      renderOrders();
    }

    function getStatusInfo(status) {
      const map = {
        pending:   { label: "قيد الانتظار", cls: "status-pending",   icon: "🕐", step: 0 },
        confirmed: { label: "مؤكد",         cls: "status-confirmed", icon: "✅", step: 1 },
        shipped:   { label: "قيد التوصيل", cls: "status-shipped",   icon: "🚚", step: 2 },
        delivered: { label: "تم التسليم",   cls: "status-delivered", icon: "🎉", step: 3 },
        cancelled: { label: "ملغي",         cls: "status-cancelled", icon: "❌", step: -1 }
      };
      return map[status] || map.pending;
    }

    function getTrackingBar(step) {
      const steps = [
        { icon: "📋", label: "الطلب" },
        { icon: "✅", label: "تأكيد" },
        { icon: "🚚", label: "توصيل" },
        { icon: "🎉", label: "تسليم" }
      ];
      return `<div class="tracking-bar">
        ${steps.map((s, i) => `
          <div class="track-step">
            <div class="track-line ${i <= step ? 'done' : ''}"></div>
            <div class="track-icon ${i < step ? 'done' : i === step ? 'current' : ''}">${s.icon}</div>
            <div class="track-label ${i < step ? 'done' : i === step ? 'current' : ''}">${s.label}</div>
          </div>`).join("")}
      </div>`;
    }

    function formatDate(timestamp) {
      if (!timestamp) return "—";
      const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return d.toLocaleDateString("ar-DZ", { year: "numeric", month: "long", day: "numeric" });
    }

    function renderOrders() {
      const list = document.getElementById("ordersList");
      let filtered = currentFilter === "all"
        ? allOrders
        : allOrders.filter(o => o.status === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>لا توجد طلبات</h3>
            <p>لم تقم بأي طلب بعد، ابدأ التسوق الآن!</p>
            <a href="products.html" class="btn-shop">🛍️ تسوّق الآن</a>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(order => {
        const statusInfo = getStatusInfo(order.status);
        const itemsHTML = (order.items || []).map(item => `
          <div class="order-item-row">
            <div class="item-thumb">
              ${item.image ? `<img src="${item.image}" alt="${item.name}">` : "🛍️"}
            </div>
            <div class="item-details">
              <div class="name">${item.name}</div>
              <div class="qty">الكمية: ${item.qty}</div>
            </div>
            <div class="item-price">${Number(item.price * item.qty).toLocaleString()} دج</div>
          </div>`).join("");

        return `
          <div class="order-card">
            <div class="order-card-header">
              <div>
                <div class="order-id">طلب رقم: <span>#${order.id.substring(0,8).toUpperCase()}</span></div>
                <div class="order-date">📅 ${formatDate(order.createdAt)}</div>
              </div>
              <div class="${'status-badge ' + statusInfo.cls}">
                ${statusInfo.icon} ${statusInfo.label}
              </div>
            </div>
            ${order.status !== 'cancelled' ? getTrackingBar(statusInfo.step) : ''}
            <div class="order-items-list">${itemsHTML}</div>
            <div class="order-card-footer">
              <div class="order-total">
                الإجمالي: <span>${Number(order.total).toLocaleString()} دج</span>
              </div>
              <button class="btn-reorder" onclick="reorder(${JSON.stringify(order.items).replace(/"/g, '&quot;')})">
               🔄 إعادة الطلب
             </button>
              <button class="btn-reorder" style="background:#fff0e6;color:var(--orange);"
               onclick="window.location.href='return-request.html?orderId=${order.id}'">
                ↩️ طلب إرجاع
             </button> 
            </div>
          </div>`;
      }).join("");
    }

    function reorder(items) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      items.forEach(item => {
        const existing = cart.find(i => i.id === item.id);
        if (existing) { existing.qty += item.qty; }
        else { cart.push(item); }
      });
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();
      showToast("✅ تمت إضافة المنتجات للسلة!");
    }

    function showToast(msg) {
      const t = document.createElement("div");
      t.textContent = msg;
      t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
        background:#1e293b;color:white;padding:12px 24px;border-radius:12px;
        font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;
        z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
